name: Deploy to Mocahost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mocahost-watch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear FTP sync state (force fresh comparison)
        run: |
          curl --ftp-ssl --user hivetec1:${{ secrets.FTP_PASSWORD }} \
            ftp://65.181.111.131/public_html/watch/.ftp-deploy-sync-state.json \
            -Q "DELE /public_html/watch/.ftp-deploy-sync-state.json" \
            --silent --show-error || true

      - name: Deploy via FTP (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/watch/
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
            docs/**
            config/config.php
            data/subscribers.json
            data/tokens.json
            data/firebase_certs.json
            data/meetup_cache.json
            data/attendance.json

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via FTP (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/watch/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
            docs/**
            config/config.php
            data/subscribers.json
            data/tokens.json
            data/firebase_certs.json
            data/meetup_cache.json
            data/attendance.json

      - name: Wait before retry
        if: steps.deploy2.outcome == 'failure'
        run: sleep 15

      - name: Deploy via FTP (attempt 3)
        if: steps.deploy2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/watch/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
            docs/**
            config/config.php
            data/subscribers.json
            data/tokens.json
            data/firebase_certs.json
            data/meetup_cache.json
            data/attendance.json

      - name: Upload server Zoom env
        run: |
          {
            echo "ZOOM_CLIENT_ID=${{ secrets.ZOOM_CLIENT_ID }}"
            echo "ZOOM_CLIENT_SECRET=${{ secrets.ZOOM_CLIENT_SECRET }}"
            echo "ZOOM_ACCOUNT_ID=${{ secrets.ZOOM_ACCOUNT_ID }}"
            echo "ZOOM_SECRET_TOKEN=${{ secrets.ZOOM_SECRET_TOKEN }}"
          } > /tmp/watch-zoom.env
          curl --ftp-ssl --user hivetec1:${{ secrets.FTP_PASSWORD }} \
            --upload-file /tmp/watch-zoom.env \
            ftp://65.181.111.131/public_html/watch/.env \
            --silent --show-error
