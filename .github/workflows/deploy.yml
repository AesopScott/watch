name: Deploy to Mocahost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mocahost-watch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/watch/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
            docs/**
            config/config.php
            data/subscribers.json
            data/tokens.json
            data/firebase_certs.json
            data/meetup_cache.json
